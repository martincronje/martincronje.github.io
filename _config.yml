title: martin cronjé
email: martin@cron.je
description: My experiences in leading, building and transforming teams to deliver well-crafted software.
baseurl: ""
url: "https://cron.je"

remote_theme: mmistakes/minimal-mistakes@4.26.2

minimal_mistakes_skin: mint

author:
  name: Martin Cronjé
  bio: Senior Director of Engineering at Canva. I write about engineering leadership, teams, and software.
  links:
    - label: LinkedIn
      icon: fab fa-linkedin
      url: https://www.linkedin.com/in/mcronje
    - label: GitHub
      icon: fab fa-github
      url: https://github.com/martincronje

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      share: false
      related: false
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

pagination:
  enabled: true
  per_page: 10

header_pages:
  - readme.markdown
